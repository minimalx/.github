name: Dependabot vulnerability digest → Slack

on:
  schedule:
    # Monday 10:00 UTC weekly digest
    - cron: '0 10 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    name: Post Dependabot digest to Slack
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Diagnose org Dependabot endpoint directly
        env:
          TOKEN: ${{ secrets.DEPENDABOT_SCAN_TOKEN }}
        run: |
          echo "HTTP status + body from /orgs/minimalx/dependabot/alerts?per_page=1:"
          curl -sS -o /tmp/body.json -w "status=%{http_code}\n" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/minimalx/dependabot/alerts?per_page=1"
          echo "--- response body (first 500 chars) ---"
          head -c 500 /tmp/body.json; echo
          echo "--- number of alerts returned ---"
          jq 'length' /tmp/body.json 2>/dev/null || echo "(not a JSON array)"

      - name: Notify vulnerabilities
        # Pinned to a release tag; check https://github.com/kunalnagarco/action-cve/releases for updates.
        uses: kunalnagarco/action-cve@v1.17.0
        with:
          token: ${{ secrets.DEPENDABOT_SCAN_TOKEN }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          org: minimalx
          count: 50
